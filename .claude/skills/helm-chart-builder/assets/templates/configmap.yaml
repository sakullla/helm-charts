apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "<CHART-NAME>.fullname" . }}-config
  labels:
    {{- include "<CHART-NAME>.labels" . | nindent 4 }}
{{- $env := dict -}}
{{/*
Add structured/auto-wired env defaults here, for example:
{{- if .Values.dependencyAutoConfig.enabled }}
  {{- if .Values.app.url }}
    {{- $_ := set $env "APP_URL" .Values.app.url }}
  {{- end }}
{{- end }}
*/}}
{{- range $key, $val := .Values.env }}
  {{- $_ := set $env $key $val }}
{{- end }}
data:
  {{- range $key, $val := $env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
