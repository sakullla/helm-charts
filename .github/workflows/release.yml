name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Vendor Local Chart Dependencies
        shell: python
        run: |
          import os
          import subprocess
          import yaml

          repo_url = "https://sakullla.github.io/helm-charts"
          charts_root = "charts"

          for chart_name in sorted(os.listdir(charts_root)):
              chart_dir = os.path.join(charts_root, chart_name)
              chart_yaml = os.path.join(chart_dir, "Chart.yaml")
              if not os.path.isfile(chart_yaml):
                  continue

              with open(chart_yaml, "r", encoding="utf-8") as f:
                  chart = yaml.safe_load(f) or {}

              dependencies = chart.get("dependencies") or []
              if not dependencies:
                  continue

              vendor_dir = os.path.join(chart_dir, "charts")
              os.makedirs(vendor_dir, exist_ok=True)

              for dependency in dependencies:
                  if dependency.get("repository") != repo_url:
                      continue

                  dep_name = dependency.get("name")
                  dep_version = str(dependency.get("version", "")).strip()
                  if not dep_name or not dep_version:
                      continue

                  local_chart_dir = os.path.join(charts_root, dep_name)
                  local_chart_yaml = os.path.join(local_chart_dir, "Chart.yaml")
                  if not os.path.isfile(local_chart_yaml):
                      continue

                  with open(local_chart_yaml, "r", encoding="utf-8") as f:
                      local_chart = yaml.safe_load(f) or {}

                  local_version = str(local_chart.get("version", "")).strip()
                  if local_version != dep_version:
                      raise SystemExit(
                          f"Dependency version mismatch for {chart_name} -> {dep_name}: "
                          f"expected {dep_version}, found local {local_version}"
                      )

                  for filename in os.listdir(vendor_dir):
                      if filename.startswith(f"{dep_name}-") and filename.endswith(".tgz"):
                          os.remove(os.path.join(vendor_dir, filename))

                  subprocess.run(
                      ["helm", "package", local_chart_dir, "-d", vendor_dir],
                      check=True,
                  )

      # ------------------------------------------------------------------
      # 1. 发布环节
      # ------------------------------------------------------------------
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      # ------------------------------------------------------------------
      # 2. 清理 index.yaml (Python 强力版 - 只保留最新 1 个版本)
      # ------------------------------------------------------------------
      - name: Prune index.yaml (Keep Latest Only)
        shell: python
        run: |
          import yaml
          import os
          import subprocess

          # 1. 切换到 gh-pages 获取最新的 index.yaml
          print("🔄 Fetching gh-pages...")
          subprocess.run(["git", "fetch", "origin", "gh-pages"], check=True)
          subprocess.run(["git", "checkout", "gh-pages"], check=True)

          file_path = 'index.yaml'
          if not os.path.exists(file_path):
              print(f"❌ Error: {file_path} not found.")
              exit(0) # 如果是第一次发布可能还没文件，不报错

          print("📖 Reading index.yaml...")
          with open(file_path, 'r') as f:
              data = yaml.safe_load(f)

          changes_made = False
          
          # 2. 裁剪逻辑：每个 Chart 只留列表第 0 项
          if 'entries' in data:
              for chart_name, versions in data['entries'].items():
                  original_count = len(versions)
                  if original_count > 1:
                      print(f"✂️ Pruning {chart_name}: {original_count} -> 1")
                      data['entries'][chart_name] = [versions[0]]
                      changes_made = True
          
          # 3. 如果有改动，写回文件并提交
          if changes_made:
              print("💾 Writing changes back to index.yaml...")
              with open(file_path, 'w') as f:
                  yaml.dump(data, f, default_flow_style=False, sort_keys=False)
              
              print("📦 Committing changes...")
              subprocess.run(["git", "add", "index.yaml"], check=True)
              subprocess.run(["git", "commit", "-m", "chore: prune index.yaml [skip ci]"], check=True)
              
              # 推送 (注意：这里使用 token url 避免权限问题，Python 中需用 subprocess 调用 git push)
              repo_url = f"https://{os.environ['GITHUB_ACTOR']}:{os.environ['GH_TOKEN']}@github.com/{os.environ['GITHUB_REPOSITORY']}.git"
              subprocess.run(["git", "push", repo_url, "gh-pages"], check=True)
              print("✅ index.yaml cleaned and pushed.")
          else:
              print("✅ index.yaml is already clean.")
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # 切回 main 分支，虽然 workflow 即将结束，但是个好习惯
      - name: Checkout Main
        run: git checkout main

      # ------------------------------------------------------------------
      # 3. 清理旧 Release/Tag (只保留最近 2 个)
      # ------------------------------------------------------------------
      - name: Cleanup Old Releases (Keep last 2)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A. 获取本次变更的 chart
          CHANGED_CHARTS=$(git diff --name-only HEAD^ HEAD | grep '^charts/' | cut -d/ -f2 | sort -u)

          if [ -z "$CHANGED_CHARTS" ]; then
             echo "🤔 No charts modified in this push. Skipping partial cleanup."
             # 如果你想每次都全量检查，取消下面这行的注释:
             # CHANGED_CHARTS=$(ls -d charts/*/ | xargs -n 1 basename)
             exit 0
          fi

          echo "📋 Target Charts for cleanup: $CHANGED_CHARTS"

          for CHART_NAME in $CHANGED_CHARTS; do
            if [ ! -d "charts/$CHART_NAME" ]; then continue; fi

            echo "🧹 Checking cleanup for Chart: $CHART_NAME ..."

            # B. 核心逻辑
            # --limit 1000: 关键优化，防止版本太多搜不到
            # tail -n +3: 保留前2个，从第3个开始删
            RELEASES_TO_DELETE=$(gh release list \
              --limit 1000 \
              --order desc \
              --json tagName \
              --jq ".[] | select(.tagName | startswith(\"$CHART_NAME-\")) | .tagName" \
              | tail -n +3)

            if [ -z "$RELEASES_TO_DELETE" ]; then
              echo "  ✅ $CHART_NAME has 2 or fewer releases. Clean."
            else
              echo "  🗑️ Deleting old releases:"
              echo "$RELEASES_TO_DELETE"
              echo "$RELEASES_TO_DELETE" | xargs -r -I {} gh release delete "{}" --cleanup-tag -y
            fi
          done
