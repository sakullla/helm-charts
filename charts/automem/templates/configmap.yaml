apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "automem.fullname" . }}-config
  labels:
    {{- include "automem.labels" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.env }}
  {{ $key }}: {{ tpl ($val | toString) $ | quote }}
  {{- end }}
  ENABLE_GRAPH_VIEWER: {{ .Values.graphViewer.enabled | quote }}
  {{- if .Values.graphViewer.enabled }}
  GRAPH_VIEWER_URL: {{ required "graphViewer.url is required when graphViewer.enabled=true" .Values.graphViewer.url | quote }}
  VIEWER_ALLOWED_ORIGINS: {{ default .Values.graphViewer.url .Values.graphViewer.allowedOrigins | quote }}
  {{- end }}
