# Multi-tenant example for one AutoMem tenant release.
# Deploy one Helm release per tenant and customize:
# - release name / namespace
# - hostnames and tokens
# - FALKORDB_GRAPH / QDRANT_COLLECTION

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: tenant-a-automem.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tenant-a-automem-tls
      hosts:
        - tenant-a-automem.example.com

# Keep graph/collection unique per tenant when sharing backends.
env:
  FLASK_ENV: "production"
  FLASK_DEBUG: "0"
  PORT: "8001"
  EMBEDDING_PROVIDER: "auto"
  AUTOMEM_MODELS_DIR: "/root/.config/automem/models"
  FALKORDB_GRAPH: "memories_tenant_a"
  QDRANT_COLLECTION: "memories_tenant_a"

secrets:
  AUTOMEM_API_TOKEN: "tenant-a-api-token"
  ADMIN_API_TOKEN: "tenant-a-admin-token"
  # Must match falkordb.secrets.REDIS_PASSWORD if FalkorDB auth is enabled.
  FALKORDB_PASSWORD: ""
  QDRANT_API_KEY: ""
  OPENAI_API_KEY: ""

# Use shared external FalkorDB/Qdrant for multi-tenant mode.
falkordb:
  enabled: false
qdrant:
  enabled: false

api:
  falkordbHost: "shared-falkordb.default.svc.cluster.local"
  falkordbPort: "6379"
  qdrantUrl: "http://shared-qdrant.default.svc.cluster.local:6333"
