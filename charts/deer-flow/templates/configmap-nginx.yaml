{{- if not .Values.httpRoute.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deer-flow.fullname" . }}-nginx-config
  labels:
    {{- include "deer-flow.labels" . | nindent 4 }}
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }

    pid /tmp/nginx.pid;

    http {
      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;

      access_log /dev/stdout;
      error_log /dev/stderr;

      # Kubernetes cluster DNS resolver
      resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

      upstream gateway {
        zone gateway 64k;
        server {{ include "deer-flow.fullname" . }}-gateway:{{ .Values.gateway.service.port }};
      }

      upstream langgraph {
        zone langgraph 64k;
        server {{ include "deer-flow.fullname" . }}-langgraph:{{ .Values.langgraph.service.port }};
      }

      upstream frontend {
        zone frontend 64k;
        server {{ include "deer-flow.fullname" . }}-frontend:{{ .Values.frontend.service.port }};
      }

      server {
        listen {{ .Values.nginx.service.port }} default_server;
        listen [::]:{{ .Values.nginx.service.port }} default_server;
        server_name _;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;

        if ($request_method = 'OPTIONS') {
          return 204;
        }

        # LangGraph API routes
        location /api/langgraph/ {
          rewrite ^/api/langgraph/(.*) /$1 break;
          proxy_pass http://langgraph;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Connection '';
          proxy_buffering off;
          proxy_cache off;
          proxy_set_header X-Accel-Buffering no;
          proxy_connect_timeout 600s;
          proxy_send_timeout 600s;
          proxy_read_timeout 600s;
          chunked_transfer_encoding on;
        }

        # Gateway-backed LangGraph-compatible API
        location /api/langgraph-compat/ {
          rewrite ^/api/langgraph-compat/(.*) /api/$1 break;
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Connection '';
          proxy_buffering off;
          proxy_cache off;
          proxy_set_header X-Accel-Buffering no;
          proxy_connect_timeout 600s;
          proxy_send_timeout 600s;
          proxy_read_timeout 600s;
          chunked_transfer_encoding on;
        }

        location /api/models {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/memory {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/mcp {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/skills {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/agents {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/threads/[^/]+/uploads {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          client_max_body_size 100M;
          proxy_request_buffering off;
        }

        location ~ ^/api/threads {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /redoc {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
          proxy_pass http://gateway;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        {{- if .Values.provisioner.enabled }}
        # Sandbox provisioner API
        location /api/sandboxes {
          set $provisioner_upstream {{ include "deer-flow.fullname" . }}-provisioner:{{ .Values.provisioner.service.port }};
          proxy_pass http://$provisioner_upstream;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        {{- end }}

        # All other requests go to frontend
        location / {
          proxy_pass http://frontend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_cache_bypass $http_upgrade;
          proxy_connect_timeout 600s;
          proxy_send_timeout 600s;
          proxy_read_timeout 600s;
        }
      }
    }
{{- end }}
