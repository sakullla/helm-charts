{{- if .Values.httpRoute.enabled -}}
{{- $fullName := include "deer-flow.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "deer-flow.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.httpRoute.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    # Rule 1: LangGraph API — strip /api/langgraph prefix and forward to langgraph service
    - matches:
        - path:
            type: PathPrefix
            value: /api/langgraph/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ $fullName }}-langgraph
          port: {{ .Values.langgraph.service.port }}
          group: ''
          kind: Service
          weight: 1

    # Rule 2: Gateway API — /api/* paths and documentation endpoints
    - matches:
        - path:
            type: PathPrefix
            value: /api/
        - path:
            type: PathPrefix
            value: /health
        - path:
            type: PathPrefix
            value: /docs
        - path:
            type: PathPrefix
            value: /redoc
        - path:
            type: Exact
            value: /openapi.json
      backendRefs:
        - name: {{ $fullName }}-gateway
          port: {{ .Values.gateway.service.port }}
          group: ''
          kind: Service
          weight: 1

    # Rule 3: Frontend — all remaining requests
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $fullName }}-frontend
          port: {{ .Values.frontend.service.port }}
          group: ''
          kind: Service
          weight: 1

    {{- /* Additional user-defined rules */}}
    {{- range .Values.httpRoute.rules }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
