{{- if .Values.ingress.enabled -}}
{{- $fullName := include "deer-flow.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "deer-flow.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # LangGraph API — forward to langgraph service
          - path: /api/langgraph/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-langgraph
                port:
                  number: {{ $.Values.langgraph.service.port }}
          # Gateway API — /api/* and documentation endpoints
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-gateway
                port:
                  number: {{ $.Values.gateway.service.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-gateway
                port:
                  number: {{ $.Values.gateway.service.port }}
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-gateway
                port:
                  number: {{ $.Values.gateway.service.port }}
          - path: /redoc
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-gateway
                port:
                  number: {{ $.Values.gateway.service.port }}
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: {{ $fullName }}-gateway
                port:
                  number: {{ $.Values.gateway.service.port }}
          # Frontend — all remaining requests
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-frontend
                port:
                  number: {{ $.Values.frontend.service.port }}
    {{- end }}
{{- end }}
