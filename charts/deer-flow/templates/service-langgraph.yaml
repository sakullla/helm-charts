apiVersion: v1
kind: Service
metadata:
  name: {{ include "deer-flow.fullname" . }}-langgraph
  labels:
    {{- include "deer-flow.componentLabels" (list "langgraph" .) | nindent 4 }}
spec:
  type: {{ .Values.langgraph.service.type }}
  ports:
    - port: {{ .Values.langgraph.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "deer-flow.componentSelectorLabels" (list "langgraph" .) | nindent 4 }}
