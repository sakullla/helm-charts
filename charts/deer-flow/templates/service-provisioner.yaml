{{- if .Values.provisioner.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "deer-flow.fullname" . }}-provisioner
  labels:
    {{- include "deer-flow.componentLabels" (list "provisioner" .) | nindent 4 }}
spec:
  type: {{ .Values.provisioner.service.type }}
  ports:
    - port: {{ .Values.provisioner.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "deer-flow.componentSelectorLabels" (list "provisioner" .) | nindent 4 }}
{{- end }}
