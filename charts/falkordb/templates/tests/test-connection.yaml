apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "falkordb.fullname" . }}-test-connection"
  labels:
    {{- include "falkordb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: tcp-check
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - 'nc -z -w 3 {{ include "falkordb.fullname" . }} {{ .Values.service.redisPort }}'
  restartPolicy: Never
