# Default values for falkordb.

replicaCount: 1

image:
  repository: falkordb/falkordb
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
command: []
args: []

# Service Account
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod configuration
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # runAsNonRoot: true
  # runAsUser: 1000

# Service configuration
service:
  annotations: {}
  type: ClusterIP
  redisPort: 6379
  browserPort: 3000
  exposeBrowserPort: true
  # nodePortRedis: 30379
  # nodePortBrowser: 30030

# Ingress routes the FalkorDB Browser HTTP endpoint.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: falkordb.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Gateway API HTTPRoute for the browser HTTP endpoint.
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - falkordb.local
  rules: []

# Health probes for Redis endpoint
startupProbe:
  tcpSocket:
    port: redis
  failureThreshold: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1

livenessProbe:
  tcpSocket:
    port: redis
  periodSeconds: 20
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: redis
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Resource limits
resources: {}

# Autoscaling (typically disabled for stateful databases)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Persistence
persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""
  annotations: {}
  mountPath: /var/lib/falkordb/data

# Additional storage
volumes: []
volumeMounts: []

# Scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# Non-sensitive application configuration (ConfigMap)
env: {}

# Sensitive application configuration (Secret)
secrets:
  REDIS_PASSWORD: ""

# Extra environment variables
extraEnv: []
