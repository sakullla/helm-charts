image:
  repository: ghcr.io/firecrawl/firecrawl
  tag: "latest"

resources:
  requests:
    cpu: 10m
    memory: 200Mi
  limits:
    cpu: 200m
    memory: 400Mi

httpRoute:
  enabled: true
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: kube-system
  hostnames:
    - firecrawl.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

app:
  environment: production
  loggingLevel: INFO
  isKubernetes: true
  useDbAuthentication: false

search:
  searxngEndpoint: http://lobehub-searxng:8080

apiKeys:
  openaiApiKey: ""
  openaiBaseUrl: ""
  bullAuthKey: "replace-me"
  testApiKey: "replace-me"

playwright:
  enabled: true
  proxy:
    server: http://proxy.example:3128
    username: ""
    password: ""

nuqPostgres:
  enabled: true

valkey:
  enabled: true
