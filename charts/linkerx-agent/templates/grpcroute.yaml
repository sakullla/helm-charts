{{- if .Values.grpcRoute.enabled -}}
{{- $backendName := include "linkerx-agent.backendFullname" . -}}
{{- $grpcPort := .Values.backend.service.grpcPort -}}
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: {{ include "linkerx-agent.fullname" . }}-grpc
  labels:
    {{- include "linkerx-agent.labels" . | nindent 4 }}
  {{- with .Values.grpcRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.grpcRoute.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grpcRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.grpcRoute.rules }}
    - {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ $backendName }}
          port: {{ $grpcPort }}
          group: ''
          kind: Service
          weight: 1
    {{- end }}
{{- end }}
