{{- if .Values.httpRoute.enabled -}}
{{- $backendName := include "linkerx-agent.backendFullname" . -}}
{{- $frontendName := include "linkerx-agent.frontendFullname" . -}}
{{- $backendHttpPort := .Values.backend.service.httpPort -}}
{{- $frontendPort := .Values.frontend.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "linkerx-agent.fullname" . }}
  labels:
    {{- include "linkerx-agent.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.httpRoute.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: {{ $backendName }}
          port: {{ $backendHttpPort }}
          group: ''
          kind: Service
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /downloads/agent/
      backendRefs:
        - name: {{ $backendName }}
          port: {{ $backendHttpPort }}
          group: ''
          kind: Service
          weight: 1
    - {{- range .Values.httpRoute.rules }}
      {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ $frontendName }}
          port: {{ $frontendPort }}
          group: ''
          kind: Service
          weight: 1
    {{- end }}
{{- end }}
