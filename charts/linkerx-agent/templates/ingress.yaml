{{- if .Values.ingress.enabled -}}
{{- $backendName := include "linkerx-agent.backendFullname" . -}}
{{- $frontendName := include "linkerx-agent.frontendFullname" . -}}
{{- $backendHttpPort := .Values.backend.service.httpPort -}}
{{- $frontendPort := .Values.frontend.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "linkerx-agent.fullname" . }}
  labels:
    {{- include "linkerx-agent.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ $backendName }}
                port:
                  number: {{ $backendHttpPort }}
          - path: /downloads/agent/
            pathType: Prefix
            backend:
              service:
                name: {{ $backendName }}
                port:
                  number: {{ $backendHttpPort }}
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ $frontendName }}
                port:
                  number: {{ $frontendPort }}
          {{- end }}
    {{- end }}
{{- end }}
