apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lobehub.fullname" . }}-secret
  labels:
    {{- include "lobehub.labels" . | nindent 4 }}
type: Opaque
{{- $secrets := dict -}}
{{- if .Values.database.url }}
  {{- $_ := set $secrets "DATABASE_URL" .Values.database.url }}
{{- else if and .Values.dependencyAutoConfig.enabled .Values.paradedb.enabled }}
  {{- $_ := set $secrets "DATABASE_URL" (include "lobehub.paradedbDatabaseUrl" .) }}
{{- end }}
{{- if .Values.auth.secret }}
  {{- $_ := set $secrets "AUTH_SECRET" .Values.auth.secret }}
{{- end }}
{{- if .Values.auth.keyVaultsSecret }}
  {{- $_ := set $secrets "KEY_VAULTS_SECRET" .Values.auth.keyVaultsSecret }}
{{- end }}
{{- if .Values.auth.oidc.jwksKey }}
  {{- $_ := set $secrets "JWKS_KEY" .Values.auth.oidc.jwksKey }}
{{- end }}
{{- range $key, $val := .Values.auth.secrets }}
  {{- $_ := set $secrets $key $val }}
{{- end }}
{{- if .Values.llm.openai.apiKey }}
  {{- $_ := set $secrets "OPENAI_API_KEY" .Values.llm.openai.apiKey }}
{{- end }}
{{- if .Values.storage.s3.accessKeyId }}
  {{- $_ := set $secrets "S3_ACCESS_KEY" .Values.storage.s3.accessKeyId }}
  {{- $_ := set $secrets "S3_ACCESS_KEY_ID" .Values.storage.s3.accessKeyId }}
{{- end }}
{{- if .Values.storage.s3.secretAccessKey }}
  {{- $_ := set $secrets "S3_SECRET_ACCESS_KEY" .Values.storage.s3.secretAccessKey }}
{{- end }}
{{- range $key, $val := .Values.secrets }}
  {{- $_ := set $secrets $key $val }}
{{- end }}
data:
  {{- range $key, $val := $secrets }}
  {{ $key }}: {{ $val | b64enc | quote }}
  {{- end }}
