# Default values for nginx-reverse-emby.

# Base configuration
replicaCount: 1

image:
  repository: sakullla/nginx-reverse-emby
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
command: []
args: []

# Service Account
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod configuration
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    add:
      - NET_BIND_SERVICE
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Service configuration
service:
  annotations: {}
  type: ClusterIP
  # Panel port (management interface)
  panelPort: 8080
  # Proxy port (reverse proxy, no SSL in front_proxy mode)
  proxyPort: 3000

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Gateway API HTTPRoute
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local

# Health probes
startupProbe:
  tcpSocket:
    port: panel
  failureThreshold: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1

livenessProbe:
  httpGet:
    path: /panel-api/health
    port: panel
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /panel-api/health
    port: panel
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Resource limits
resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# Persistence
persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""
  annotations: {}

# Storage volumes
volumes: []
volumeMounts: []

# Scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# Nginx Reverse Emby Configuration
panel:
  # Panel role: master or agent
  role: master
  # Deploy mode: direct or front_proxy
  # In Kubernetes, front_proxy is recommended (external ingress handles SSL)
  deployMode: front_proxy
  # Auto apply configuration changes
  autoApply: true

# ACME SSL Configuration
acme:
  # Email for Let's Encrypt registration
  email: ""
  # Certificate authority (letsencrypt, zerossl, etc)
  ca: letsencrypt
  # DNS provider for DNS-01 challenge (cf for Cloudflare)
  dnsProvider: ""

# Master/Agent Configuration
master:
  # Agent registration token
  registerToken: ""
  # Local agent name (for master node)
  localAgentName: ""
  # Local agent tags (comma-separated)
  localAgentTags: ""

# Application configuration (non-sensitive)
env:
  # PANEL_PORT: "8080"
  # PANEL_ROLE: "master"
  # PROXY_DEPLOY_MODE: "direct"
  # ACME_CA: "letsencrypt"
  # PANEL_AUTO_APPLY: "1"

# Sensitive configuration
secrets:
  # API_TOKEN: ""
  # MASTER_REGISTER_TOKEN: ""
  # ACME_EMAIL: ""
  # CF_Token: ""
  # CF_Account_ID: ""

# Extra environment variables
extraEnv: []
