apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-stream.fullname" . }}-config
  labels:
    {{- include "nginx-stream.labels" . | nindent 4 }}
data:
  nginx.conf: |
    user {{ .Values.nginx.user }};
    worker_processes {{ .Values.nginx.workerProcesses }};

    events {
      worker_connections {{ .Values.nginx.workerConnections }};
    }

    stream {
      resolver {{ .Values.nginx.resolver }};
{{- $tcpDefault := dig "protocolDefaults" "tcpEnabled" true .Values.nginx }}
{{- $udpDefault := dig "protocolDefaults" "udpEnabled" true .Values.nginx }}
{{- range $idx, $forward := .Values.nginx.forwards }}
{{- $tcpEnabled := dig "tcp" "enabled" $tcpDefault $forward }}
{{- $udpEnabled := dig "udp" "enabled" $udpDefault $forward }}
{{- $backendCount := include "nginx-stream.backendCount" (dict "forward" $forward) | int }}
{{- if and $forward.listenPort (gt $backendCount 0) (or $tcpEnabled $udpEnabled) }}

{{ include "nginx-stream.renderStreamUpstream" (dict "index" $idx "forward" $forward) | nindent 6 }}
{{- end }}
{{- end }}
{{- range $idx, $forward := .Values.nginx.forwards }}
{{- $tcpEnabled := dig "tcp" "enabled" $tcpDefault $forward }}
{{- $udpEnabled := dig "udp" "enabled" $udpDefault $forward }}
{{- $backendCount := include "nginx-stream.backendCount" (dict "forward" $forward) | int }}
{{- $upstreamName := include "nginx-stream.upstreamName" (dict "index" $idx "forwardName" $forward.name) }}
{{- if and $forward.listenPort (gt $backendCount 0) $tcpEnabled }}

      server {
        listen {{ $forward.listenPort }};
        proxy_pass {{ $upstreamName }};
{{- with $.Values.nginx.timeouts.tcp.proxyConnectTimeout }}
        proxy_connect_timeout {{ . }};
{{- end }}
{{- with $.Values.nginx.timeouts.tcp.proxyTimeout }}
        proxy_timeout {{ . }};
{{- end }}
      }
{{- end }}
{{- if and $forward.listenPort (gt $backendCount 0) $udpEnabled }}

      server {
        listen {{ $forward.listenPort }} udp;
        proxy_pass {{ $upstreamName }};
{{- with $.Values.nginx.timeouts.udp.proxyTimeout }}
        proxy_timeout {{ . }};
{{- end }}
      }
{{- end }}
{{- end }}
{{- with .Values.nginx.extraStreamConfig }}
{{ . | nindent 6 }}
{{- end }}
    }
  {{- range $key, $val := .Values.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
