apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.fullname" . }}-secret
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
{{- $secrets := dict -}}
{{/* Auto-wire gateway token and Anthropic credentials */}}
{{- if .Values.gateway.token }}
  {{- $_ := set $secrets "OPENCLAW_GATEWAY_TOKEN" .Values.gateway.token -}}
{{- end }}
{{- if .Values.ai.anthropic.apiKey }}
  {{- $_ := set $secrets "ANTHROPIC_API_KEY" .Values.ai.anthropic.apiKey -}}
{{- end }}
{{- if .Values.ai.anthropic.sessionKey }}
  {{- $_ := set $secrets "CLAUDE_AI_SESSION_KEY" .Values.ai.anthropic.sessionKey -}}
{{- end }}
{{- if .Values.ai.anthropic.webSessionKey }}
  {{- $_ := set $secrets "CLAUDE_WEB_SESSION_KEY" .Values.ai.anthropic.webSessionKey -}}
{{- end }}
{{- if .Values.ai.anthropic.webCookie }}
  {{- $_ := set $secrets "CLAUDE_WEB_COOKIE" .Values.ai.anthropic.webCookie -}}
{{- end }}
{{/* User-provided secrets (merged last, can override above) */}}
{{- range $key, $val := .Values.secrets }}
  {{- $_ := set $secrets $key $val }}
{{- end }}
data:
  {{- range $key, $val := $secrets }}
  {{ $key }}: {{ $val | b64enc | quote }}
  {{- end }}
