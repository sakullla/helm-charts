apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "openclaw.fullname" . }}-test-connection"
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: healthz
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          curl -sf http://{{ include "openclaw.fullname" . }}:{{ .Values.service.port }}/healthz
